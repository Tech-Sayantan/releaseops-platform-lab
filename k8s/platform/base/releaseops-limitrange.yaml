apiVersion: v1
kind: LimitRange
metadata:
  name: releaseops-default-container-limits
  namespace: releaseops
  labels:
    app.kubernetes.io/part-of: releaseops
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      min:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "1"
        memory: 1Gi

