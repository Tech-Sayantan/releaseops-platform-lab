apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-telemetry-agent
  namespace: observability
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-telemetry-agent
  namespace: observability
  labels:
    app.kubernetes.io/name: node-telemetry-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-telemetry-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-telemetry-agent
    spec:
      serviceAccountName: node-telemetry-agent
      automountServiceAccountToken: false
      tolerations:
        - operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: collector
          image: "example.invalid/opentelemetry-collector@sha256:replace-me"
          args: ["--config=/etc/collector/config.yaml"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: Directory
