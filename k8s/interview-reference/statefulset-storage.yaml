apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: releaseops-gp3-demo
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
parameters:
  type: gp3
  encrypted: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-store-headless
  namespace: observability
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: metrics-store
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: metrics-store
  namespace: observability
spec:
  serviceName: metrics-store-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metrics-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metrics-store
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: metrics-store
          image: "example.invalid/prometheus@sha256:replace-me"
          args:
            - "--storage.tsdb.path=/data"
          ports:
            - name: http
              containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: releaseops-gp3-demo
        resources:
          requests:
            storage: 5Gi
