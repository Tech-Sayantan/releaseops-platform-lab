name: Infra PR Static Validation

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-pr.yml"

permissions:
  contents: read

concurrency:
  group: terraform-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  terraform-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
    defaults:
      run:
        working-directory: infra/envs/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform fmt -check -recursive
      - name: Initialize providers and modules without the remote backend
        run: terraform init -backend=false -input=false
      - name: Terraform validate
        run: terraform validate -no-color
      - name: Explain the trust boundary
        run: |
          {
            echo "### Terraform PR validation"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Environment root: \`infra/envs/dev\`"
            echo
            echo "This untrusted PR job does not receive AWS credentials."
            echo "Use the trusted plan workflow after review."
          } >> "${GITHUB_STEP_SUMMARY}"
