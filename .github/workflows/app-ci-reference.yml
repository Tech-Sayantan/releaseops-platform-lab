name: Application CI Caller Reference

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: Service to verify in an application repository layout
        required: true
        default: release-service
        type: string
      working_directory:
        description: Directory containing pom.xml and Docker context
        required: true
        default: services/release-service
        type: string
      dockerfile:
        description: Dockerfile path relative to repository root
        required: true
        default: services/release-service/Dockerfile
        type: string

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-java-service-ci.yml
    with:
      service_name: ${{ inputs.service_name }}
      working_directory: ${{ inputs.working_directory }}
      dockerfile: ${{ inputs.dockerfile }}
      ecr_repository: releaseops-dev/api
      java_version: "21"
      sonar_enabled: false
      push_image: false
