name: Application CI Reference

on:
  pull_request:
    paths:
      - "app/**"
      - "charts/**"
      - ".github/workflows/app-ci-reference.yml"

permissions:
  contents: read
  security-events: write

jobs:
  java-ci-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven stages
        run: |
          echo "Reference stages:"
          echo "mvn -B clean verify"
          echo "mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar"
          echo "docker buildx build --push"
      - name: Notify tech lead
        uses: ./.github/actions/notify-tech-lead
        with:
          recipient: platform-tech-lead
          change-summary: Application PR validation completed.
