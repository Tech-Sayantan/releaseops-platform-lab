name: Reusable Java service CI

on:
  workflow_call:
    inputs:
      service_name:
        description: Logical service name used in release metadata.
        required: true
        type: string
      working_directory:
        description: Directory containing pom.xml and the Docker build context.
        required: true
        type: string
      dockerfile:
        description: Dockerfile path relative to the repository root.
        required: true
        type: string
      ecr_repository:
        description: ECR repository path without the registry hostname.
        required: true
        type: string
      aws_region:
        description: AWS Region containing ECR.
        default: us-east-1
        type: string
      java_version:
        description: Java version used to compile and test the service.
        default: "21"
        type: string
      sonar_enabled:
        description: Run Sonar analysis and wait for its quality gate.
        default: false
        type: boolean
      sonar_host_url:
        description: SonarQube or SonarCloud server URL.
        default: https://sonarcloud.io
        type: string
      push_image:
        description: Build and publish the image after verification.
        default: false
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        description: GitHub OIDC role used only when push_image is true.
        required: false
      SONAR_TOKEN:
        description: Sonar token used only when sonar_enabled is true.
        required: false
    outputs:
      image_uri:
        description: Tag-based image URI produced by the image job.
        value: ${{ jobs.image.outputs.image_uri }}
      image_digest:
        description: Registry digest produced by the image job.
        value: ${{ jobs.image.outputs.image_digest }}

permissions:
  contents: read

jobs:
  verify:
    name: Compile, test, and package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout exact source revision
        uses: actions/checkout@v4

      - name: Set up Java and Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: maven
          cache-dependency-path: ${{ inputs.working_directory }}/pom.xml

      - name: Run Maven verification lifecycle
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [[ -x ./mvnw ]]; then
            ./mvnw --batch-mode --no-transfer-progress clean verify
          else
            mvn --batch-mode --no-transfer-progress clean verify
          fi

      - name: Require the Sonar token
        if: ${{ inputs.sonar_enabled }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "::error::SONAR_TOKEN is required when sonar_enabled=true"
            exit 1
          fi

      - name: Analyze source and enforce the Sonar quality gate
        if: ${{ inputs.sonar_enabled }}
        working-directory: ${{ inputs.working_directory }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ inputs.sonar_host_url }}
        run: |
          if [[ -x ./mvnw ]]; then
            maven_command=(./mvnw)
          else
            maven_command=(mvn)
          fi

          "${maven_command[@]}" \
              --batch-mode \
              --no-transfer-progress \
              org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
              -Dsonar.host.url="${SONAR_HOST_URL}" \
              -Dsonar.token="${SONAR_TOKEN}" \
              -Dsonar.qualitygate.wait=true \
              -Dsonar.qualitygate.timeout=300

      - name: Upload unit and integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service_name }}-test-reports
          path: |
            ${{ inputs.working_directory }}/**/target/surefire-reports/**
            ${{ inputs.working_directory }}/**/target/failsafe-reports/**
          if-no-files-found: warn
          retention-days: 14

  image:
    name: Build, publish, and scan immutable image
    if: ${{ inputs.push_image }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      security-events: write
    outputs:
      image_uri: ${{ steps.metadata.outputs.image-uri }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Require the AWS role secret
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [[ -z "${AWS_ROLE_ARN}" ]]; then
            echo "::error::AWS_ROLE_ARN is required when push_image=true"
            exit 1
          fi

      - name: Checkout exact source revision
        uses: actions/checkout@v4

      - name: Exchange GitHub OIDC token for short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Sign in Docker to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate release metadata
        id: metadata
        uses: ./.github/actions/release-metadata
        with:
          service-name: ${{ inputs.service_name }}
          registry: ${{ steps.ecr.outputs.registry }}
          repository: ${{ inputs.ecr_repository }}
          commit-sha: ${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image with provenance and SBOM
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.working_directory }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.metadata.outputs.image-uri }}
          cache-from: type=gha,scope=${{ inputs.service_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service_name }}
          provenance: mode=max
          sbom: true

      - name: Scan the published candidate image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.metadata.outputs.image-uri }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload vulnerability findings
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Record the immutable artifact
        env:
          IMAGE_URI: ${{ steps.metadata.outputs.image-uri }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### Published candidate"
            echo
            echo "- Tag reference: \`${IMAGE_URI}\`"
            echo "- Immutable digest: \`${IMAGE_DIGEST}\`"
            echo
            echo "Promote the digest, not a mutable tag."
          } >> "${GITHUB_STEP_SUMMARY}"
